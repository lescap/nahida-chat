<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天</title>
<style>
:root {
  --bg: #f5f0e8;
  --surface: #fffef9;
  --text: #3d3226;
  --sub: #8b7e6a;
  --bubble-user: #e8f5e9;
  --bubble-bot: #fff;
  --accent: #5b8c5a;
  --accent-light: #a3c9a3;
  --input-bg: #fff;
  --border: #e0d8c8;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --send-bg: #5b8c5a;
  --send-text: #fff;
}

[data-theme="dark"] {
  --bg: #1a1c1a;
  --surface: #232623;
  --text: #d4cfc4;
  --sub: #8a8578;
  --bubble-user: #2d3a2d;
  --bubble-bot: #2a2b27;
  --accent: #7db87b;
  --accent-light: #4a6b48;
  --input-bg: #2a2b27;
  --border: #3a3c36;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --send-bg: #7db87b;
  --send-text: #1a1c1a;
}

[data-theme="forest"] {
  --bg: #e8ede4;
  --surface: #f4f7f1;
  --text: #2d3a28;
  --sub: #6b7a5e;
  --bubble-user: #dce8d5;
  --bubble-bot: #fff;
  --accent: #4a7c43;
  --accent-light: #8fb886;
  --input-bg: #fff;
  --border: #ccd5c2;
  --shadow: 0 2px 12px rgba(0,0,0,0.05);
  --send-bg: #4a7c43;
  --send-text: #fff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: background 0.4s;
}

.app {
  width: 100%;
  max-width: 800px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  box-shadow: var(--shadow);
  transition: background 0.4s;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.header-left { display: flex; align-items: center; gap: 12px; }

.avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: #999;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 20px;
  font-weight: bold;
  flex-shrink: 0;
  transition: all 0.5s;
}

.avatar.unlocked { background: linear-gradient(135deg, #5b8c5a, #a3c9a3); }

.header-info h2 { font-size: 16px; font-weight: 600; transition: all 0.5s; }
.header-info span { font-size: 12px; color: var(--sub); transition: all 0.5s; }

.header-right { display: flex; gap: 6px; }

.theme-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--input-bg);
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.theme-btn:hover { border-color: var(--accent); }

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}

.messages::-webkit-scrollbar { width: 5px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

.msg {
  display: flex;
  gap: 10px;
  max-width: 80%;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: #fff;
  font-weight: bold;
  transition: all 0.5s;
}

.msg.user .msg-avatar { background: #607d8b; }
.msg.bot .msg-avatar { background: #999; }
.msg.bot.unlocked .msg-avatar { background: linear-gradient(135deg, #5b8c5a, #a3c9a3); }

.msg-body { display: flex; flex-direction: column; gap: 4px; }

.msg-bubble {
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.6;
  word-break: break-word;
  white-space: pre-wrap;
}

.msg.user .msg-bubble {
  background: var(--bubble-user);
  border-bottom-right-radius: 4px;
}

.msg.bot .msg-bubble {
  background: var(--bubble-bot);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}

.msg-time {
  font-size: 11px;
  color: var(--sub);
  padding: 0 4px;
}

.msg.user .msg-time { text-align: right; }

.typing {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 0 4px;
}

.typing.active { display: flex; }

.typing-dots { display: flex; gap: 4px; padding: 12px 16px; background: var(--bubble-bot); border: 1px solid var(--border); border-radius: 16px; border-bottom-left-radius: 4px; }
.typing-dots span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent-light);
  animation: bounce 1.4s infinite ease-in-out both;
}
.typing-dots span:nth-child(1) { animation-delay: -0.32s; }
.typing-dots span:nth-child(2) { animation-delay: -0.16s; }

@keyframes bounce { 0%,80%,100% { transform: scale(0.6); } 40% { transform: scale(1); } }

@keyframes glowPulse {
  0%, 100% { box-shadow: 0 0 8px rgba(91,140,90,0.3); }
  50% { box-shadow: 0 0 20px rgba(91,140,90,0.6); }
}

.input-area {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
  background: var(--surface);
}

.input-area textarea {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 14px;
  font-family: inherit;
  background: var(--input-bg);
  color: var(--text);
  resize: none;
  max-height: 120px;
  line-height: 1.5;
  transition: border-color 0.2s;
  outline: none;
}

.input-area textarea:focus { border-color: var(--accent); }

.send-btn {
  width: 44px; height: 44px;
  border-radius: 12px;
  border: none;
  background: var(--send-bg);
  color: var(--send-text);
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.send-btn:hover { opacity: 0.85; transform: scale(1.03); }
.send-btn:active { transform: scale(0.97); }

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--sub);
}

.empty-icon {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: #9992;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  transition: all 0.5s;
}

.empty-icon.unlocked { background: linear-gradient(135deg, #5b8c5a20, #a3c9a320); }

.empty-state h3 { font-size: 16px; color: var(--text); font-weight: 500; }
.empty-state p { font-size: 13px; }

@media (max-width: 600px) {
  .app { max-width: 100%; }
  .msg { max-width: 90%; }
}
</style>
</head>
<body data-theme="light">

<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="avatar" id="headerAvatar">●</div>
      <div class="header-info">
        <h2 id="headerName">助手</h2>
        <span id="headerStatus">待验证</span>
      </div>
    </div>
    <div class="header-right">
      <button class="theme-btn" data-theme="light" onclick="setTheme('light')" title="浅色">☀️</button>
      <button class="theme-btn" data-theme="dark" onclick="setTheme('dark')" title="深色">🌙</button>
      <button class="theme-btn" data-theme="forest" onclick="setTheme('forest')" title="森林">🌲</button>
      <button class="theme-btn" onclick="clearChat()" title="清空">🗑️</button>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon" id="emptyIcon">●</div>
      <h3 id="emptyTitle">你好，陌生人</h3>
      <p id="emptyDesc">请先表明身份</p>
    </div>
  </div>

  <div class="typing" id="typing">
    <div class="msg-avatar" id="typingAvatar" style="background:#999;color:#fff">●</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>
  </div>

  <div class="input-area">
    <textarea id="input" rows="1" placeholder="输入消息..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="send()">➤</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'nahida_chat_messages';
const VERIFY_KEY = 'nahida_verified';

const NEUTRAL_RESPONSES = [
  '你好，有什么可以帮你的吗？',
  '我在听。',
  '请说。',
  '好的。',
];

const NAHIDA_RESPONSES = [
  '这是一个有趣的问题。让我想想……',
  '从某个角度看，事物的本质往往隐藏在我们忽略的地方。',
  '智慧不在于知道答案，而在于提出正确的问题。',
  '就像一棵树，表面的枝叶容易看见，真正重要的根系却在地下——许多问题的答案也是如此。',
  '五百年的观察教会我一件事：保持好奇心比拥有答案更重要。',
  '这个问题的结构，让我想起世界树的枝杈——分叉之处，往往也藏着答案。',
  '你是对的。不过，或许还有另一种看法……',
  '好。交给我。',
  '我理解你的意思。',
  '说下去，我在听。',
];

let messages = [];
let codeStep = 0; // 0=未开始, 1=已说小吉祥草王, 2=完全验证（入梦）

function loadMessages() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    if (data) messages = JSON.parse(data);
  } catch(e) { messages = []; }
  try {
    codeStep = parseInt(localStorage.getItem(VERIFY_KEY)) || 0;
  } catch(e) { codeStep = 0; }
}

function saveMessages() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
  } catch(e) {}
  try {
    localStorage.setItem(VERIFY_KEY, codeStep.toString());
  } catch(e) {}
}

function isVerified() { return codeStep >= 2; }

function updateUI() {
  const avatar = document.getElementById('headerAvatar');
  const name = document.getElementById('headerName');
  const status = document.getElementById('headerStatus');
  const icon = document.getElementById('emptyIcon');
  const title = document.getElementById('emptyTitle');
  const desc = document.getElementById('emptyDesc');
  const typingAvatar = document.getElementById('typingAvatar');

  if (isVerified()) {
    document.title = '纳西妲 · 聊天';
    avatar.classList.add('unlocked');
    avatar.textContent = '🌿';
    name.textContent = '纳西妲';
    status.textContent = '在线 · 智慧之神';
    icon.classList.add('unlocked');
    icon.textContent = '🌿';
    title.textContent = '开始对话吧';
    desc.textContent = '我是纳西妲，须弥的草之神';
    typingAvatar.style.background = 'linear-gradient(135deg, #5b8c5a, #a3c9a3)';
    typingAvatar.textContent = '🌿';
  } else {
    document.title = '聊天';
    avatar.classList.remove('unlocked');
    avatar.textContent = '●';
    name.textContent = '助手';
    status.textContent = codeStep === 1 ? '等待验证…' : '待验证';
    icon.classList.remove('unlocked');
    icon.textContent = '●';
    title.textContent = '你好，陌生人';
    desc.textContent = '请先表明身份';
    typingAvatar.style.background = '#999';
    typingAvatar.textContent = '●';
  }
}

function render() {
  const container = document.getElementById('messages');
  const empty = document.getElementById('emptyState');

  if (messages.length === 0) {
    container.innerHTML = '';
    container.appendChild(empty);
    empty.style.display = 'flex';
    return;
  }

  empty.style.display = 'none';
  container.innerHTML = messages.map((m,i) => {
    const unlockedClass = isVerified() && m.role === 'bot' ? ' unlocked' : '';
    const botAvatar = isVerified() ? '🌿' : '●';
    return `
    <div class="msg ${m.role}${unlockedClass}">
      <div class="msg-avatar">${m.role === 'user' ? '👤' : botAvatar}</div>
      <div class="msg-body">
        <div class="msg-bubble">${escapeHtml(m.text)}</div>
        <div class="msg-time">${m.time}</div>
      </div>
    </div>
  `}).join('');

  container.scrollTop = container.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

  messages.push({ role: 'user', text, time });
  input.value = '';
  input.style.height = 'auto';
  saveMessages();
  render();
  updateUI();

  showTyping();

  // 暗语验证逻辑
  let reply;
  if (!isVerified()) {
    if (text === '小吉祥草王' && codeStep === 0) {
      codeStep = 1;
      reply = '纳西妲';
    } else if (text === '入梦' && codeStep === 1) {
      codeStep = 2;
      reply = '主人，我在。';
    } else if (codeStep === 1) {
      // 第一步后说错了，重置
      codeStep = 0;
      reply = '……请重新开始。';
    } else {
      reply = NEUTRAL_RESPONSES[Math.floor(Math.random() * NEUTRAL_RESPONSES.length)];
    }
  } else {
    reply = NAHIDA_RESPONSES[Math.floor(Math.random() * NAHIDA_RESPONSES.length)];
  }

  saveMessages();

  const delay = 600 + Math.random() * 1500;
  setTimeout(() => {
    const replyTime = new Date();
    const replyTimeStr = replyTime.getHours().toString().padStart(2,'0') + ':' + replyTime.getMinutes().toString().padStart(2,'0');
    messages.push({ role: 'bot', text: reply, time: replyTimeStr });
    saveMessages();
    hideTyping();
    render();
    updateUI();
  }, delay);
}

function showTyping() {
  document.getElementById('typing').classList.add('active');
  const container = document.getElementById('messages');
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  document.getElementById('typing').classList.remove('active');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function setTheme(theme) {
  document.body.dataset.theme = theme;
  localStorage.setItem('nahida_theme', theme);
}

function clearChat() {
  if (confirm('确定清空所有聊天记录？这将同时重置验证状态。')) {
    messages = [];
    codeStep = 0;
    saveMessages();
    render();
    updateUI();
  }
}

function initTheme() {
  const saved = localStorage.getItem('nahida_theme');
  if (saved) document.body.dataset.theme = saved;
}

loadMessages();
initTheme();
updateUI();
render();
</script>

</body>
</html>
