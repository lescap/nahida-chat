<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天</title>
<style>
:root {
  --bg: #f5f0e8;
  --surface: #fffef9;
  --text: #3d3226;
  --sub: #8b7e6a;
  --bubble-user: #e8f5e9;
  --bubble-bot: #fff;
  --accent: #5b8c5a;
  --accent-light: #a3c9a3;
  --input-bg: #fff;
  --border: #e0d8c8;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --send-bg: #5b8c5a;
  --send-text: #fff;
}

[data-theme="dark"] {
  --bg: #1a1c1a;
  --surface: #232623;
  --text: #d4cfc4;
  --sub: #8a8578;
  --bubble-user: #2d3a2d;
  --bubble-bot: #2a2b27;
  --accent: #7db87b;
  --accent-light: #4a6b48;
  --input-bg: #2a2b27;
  --border: #3a3c36;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
  --send-bg: #7db87b;
  --send-text: #1a1c1a;
}

[data-theme="forest"] {
  --bg: #e8ede4;
  --surface: #f4f7f1;
  --text: #2d3a28;
  --sub: #6b7a5e;
  --bubble-user: #dce8d5;
  --bubble-bot: #fff;
  --accent: #4a7c43;
  --accent-light: #8fb886;
  --input-bg: #fff;
  --border: #ccd5c2;
  --shadow: 0 2px 12px rgba(0,0,0,0.05);
  --send-bg: #4a7c43;
  --send-text: #fff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: background 0.4s;
}

.app {
  width: 100%;
  max-width: 800px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  box-shadow: var(--shadow);
  transition: background 0.4s;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.header-left { display: flex; align-items: center; gap: 12px; }

.avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: #999;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 20px;
  font-weight: bold;
  flex-shrink: 0;
  transition: all 0.5s;
}

.avatar.unlocked { background: linear-gradient(135deg, #5b8c5a, #a3c9a3); }

.header-info h2 { font-size: 16px; font-weight: 600; transition: all 0.5s; }
.header-info span { font-size: 12px; color: var(--sub); transition: all 0.5s; }
.header-info .api-status { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-left: 4px; vertical-align: middle; }
.header-info .api-status.on { background: #5b8c5a; }
.header-info .api-status.off { background: #cc4444; }

.header-right { display: flex; gap: 6px; }

.theme-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--input-bg);
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.theme-btn:hover { border-color: var(--accent); }

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}

.messages::-webkit-scrollbar { width: 5px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

.msg {
  display: flex;
  gap: 10px;
  max-width: 80%;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: #fff;
  font-weight: bold;
  transition: all 0.5s;
}

.msg.user .msg-avatar { background: #607d8b; }
.msg.bot .msg-avatar { background: #999; }
.msg.bot.unlocked .msg-avatar { background: linear-gradient(135deg, #5b8c5a, #a3c9a3); }

.msg-body { display: flex; flex-direction: column; gap: 4px; }

.msg-bubble {
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.6;
  word-break: break-word;
  white-space: pre-wrap;
}

.msg.user .msg-bubble {
  background: var(--bubble-user);
  border-bottom-right-radius: 4px;
}

.msg.bot .msg-bubble {
  background: var(--bubble-bot);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}

.msg-time {
  font-size: 11px;
  color: var(--sub);
  padding: 0 4px;
}

.msg.user .msg-time { text-align: right; }

.typing {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 0 4px;
}

.typing.active { display: flex; }

.typing-dots { display: flex; gap: 4px; padding: 12px 16px; background: var(--bubble-bot); border: 1px solid var(--border); border-radius: 16px; border-bottom-left-radius: 4px; }
.typing-dots span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent-light);
  animation: bounce 1.4s infinite ease-in-out both;
}
.typing-dots span:nth-child(1) { animation-delay: -0.32s; }
.typing-dots span:nth-child(2) { animation-delay: -0.16s; }

@keyframes bounce { 0%,80%,100% { transform: scale(0.6); } 40% { transform: scale(1); } }

.input-area {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
  background: var(--surface);
}

.input-area textarea {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 14px;
  font-family: inherit;
  background: var(--input-bg);
  color: var(--text);
  resize: none;
  max-height: 120px;
  line-height: 1.5;
  transition: border-color 0.2s;
  outline: none;
}

.input-area textarea:focus { border-color: var(--accent); }

.send-btn {
  width: 44px; height: 44px;
  border-radius: 12px;
  border: none;
  background: var(--send-bg);
  color: var(--send-text);
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.send-btn:active { transform: scale(0.97); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--sub);
}

.empty-icon {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: #9992;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  transition: all 0.5s;
}

.empty-icon.unlocked { background: linear-gradient(135deg, #5b8c5a20, #a3c9a320); }

.empty-state h3 { font-size: 16px; color: var(--text); font-weight: 500; }
.empty-state p { font-size: 13px; }

@media (max-width: 600px) {
  .app { max-width: 100%; }
  .msg { max-width: 90%; }
}
</style>
</head>
<body data-theme="light">

<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="avatar" id="headerAvatar">●</div>
      <div class="header-info">
        <h2 id="headerName">助手</h2>
        <span id="headerStatus">待验证<span class="api-status off" id="apiDot"></span></span>
      </div>
    </div>
    <div class="header-right">
      <button class="theme-btn" data-theme="light" onclick="setTheme('light')" title="浅色">☀️</button>
      <button class="theme-btn" data-theme="dark" onclick="setTheme('dark')" title="深色">🌙</button>
      <button class="theme-btn" data-theme="forest" onclick="setTheme('forest')" title="森林">🌲</button>
      <button class="theme-btn" onclick="clearChat()" title="清空">🗑️</button>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon" id="emptyIcon">●</div>
      <h3 id="emptyTitle">你好，陌生人</h3>
      <p id="emptyDesc">请先表明身份</p>
    </div>
  </div>

  <div class="typing" id="typing">
    <div class="msg-avatar" id="typingAvatar" style="background:#999;color:#fff">●</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>
  </div>

  <div class="input-area">
    <textarea id="input" rows="1" placeholder="输入消息..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()">➤</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'nahida_chat_messages';
const VERIFY_KEY = 'nahida_verified';
const API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1') ? '' : '';

let messages = [];
let codeStep = 0;
let isStreaming = false;
let apiAvailable = false;

function loadMessages() {
  try { messages = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { messages = []; }
  try { codeStep = parseInt(localStorage.getItem(VERIFY_KEY)) || 0; } catch(e) { codeStep = 0; }
}

function saveMessages() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(messages)); } catch(e) {}
  try { localStorage.setItem(VERIFY_KEY, codeStep.toString()); } catch(e) {}
}

function isVerified() { return codeStep >= 2; }

function updateUI() {
  const avatar = document.getElementById('headerAvatar');
  const name = document.getElementById('headerName');
  const status = document.getElementById('headerStatus');
  const icon = document.getElementById('emptyIcon');
  const title = document.getElementById('emptyTitle');
  const desc = document.getElementById('emptyDesc');
  const typingAvatar = document.getElementById('typingAvatar');


  if (isVerified()) {
    document.title = '纳西妲 · 聊天';
    avatar.classList.add('unlocked'); avatar.textContent = '🌿';
    name.textContent = '纳西妲';
    status.innerHTML = '在线 · 智慧之神<span class="api-status ' + (apiAvailable ? 'on' : 'off') + '" id="apiDot"></span>';
    if (icon) { icon.classList.add('unlocked'); icon.textContent = '🌿'; }
    if (title) title.textContent = '开始对话吧'; if (desc) desc.textContent = '我是纳西妲，须弥的草之神';
    typingAvatar.style.background = 'linear-gradient(135deg, #5b8c5a, #a3c9a3)'; typingAvatar.textContent = '🌿';
  } else {
    document.title = '聊天';
    avatar.classList.remove('unlocked'); avatar.textContent = '●';
    name.textContent = '助手';
    status.innerHTML = (codeStep === 1 ? '等待验证…' : '待验证') + '<span class="api-status ' + (apiAvailable ? 'on' : 'off') + '" id="apiDot"></span>'; const dot2 = document.getElementById('apiDot'); if (dot2 && apiAvailable) { dot2.className = 'api-status on'; } else if (dot2) { dot2.className = 'api-status off'; }
    if (icon) { icon.classList.remove('unlocked'); icon.textContent = '●'; }
    if (title) title.textContent = '你好，陌生人'; if (desc) desc.textContent = '请先表明身份';
    typingAvatar.style.background = '#999'; typingAvatar.textContent = '●';
  }
}

function render() {
  const container = document.getElementById('messages');
  const empty = document.getElementById('emptyState');

  if (messages.length === 0) {
    container.innerHTML = '';
    container.appendChild(empty);
    if (empty && empty.parentNode) { empty.style.display = 'flex'; }
    return;
  }

  if (empty && empty.parentNode) empty.style.display = 'none';
  container.innerHTML = messages.map((m) => {
    const unlockedClass = isVerified() && m.role === 'bot' ? ' unlocked' : '';
    const botAvatar = isVerified() ? '🌿' : '●';
    return `<div class="msg ${m.role}${unlockedClass}">
      <div class="msg-avatar">${m.role === 'user' ? '👤' : botAvatar}</div>
      <div class="msg-body">
        <div class="msg-bubble">${escapeHtml(m.text)}</div>
        <div class="msg-time">${m.time}</div>
      </div>
    </div>`;
  }).join('');

  container.scrollTop = container.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function nowTime() {
  const now = new Date();
  return now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}

async function send() {
  if (isStreaming) return;
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  messages.push({ role: 'user', text, time: nowTime() });
  input.value = ''; input.style.height = 'auto';
  saveMessages(); render(); updateUI();

  // Code phrase logic
  if (!isVerified()) {
    if (text === '小吉祥草王' && codeStep === 0) {
      codeStep = 1; saveMessages();
      messages.push({ role: 'bot', text: '纳西妲', time: nowTime() });
      saveMessages(); render(); updateUI(); return;
    } else if (text === '入梦' && codeStep === 1) {
      codeStep = 2; saveMessages();
      messages.push({ role: 'bot', text: '主人，我在。', time: nowTime() });
      saveMessages(); render(); updateUI(); return;
    } else if (codeStep === 1) {
      codeStep = 0; saveMessages();
      messages.push({ role: 'bot', text: '……请重新开始。', time: nowTime() });
      saveMessages(); render(); updateUI(); return;
    } else {
      messages.push({ role: 'bot', text: '你好，有什么可以帮你的吗？', time: nowTime() });
      saveMessages(); render(); updateUI(); return;
    }
  }

  // Call real AI
  await callAI(text);
}

async function callAI(userMessage) {
  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;

  const history = [];
  for (const m of messages) {
    if (m.role === 'user' || m.role === 'bot') {
      history.push(m);
    }
  }

  const placeholderIdx = messages.length;
  messages.push({ role: 'bot', text: '', time: nowTime() });
  render();
  showTyping();

  const apiUrl = API_BASE + '/api/chat';

  try {
    const resp = await fetch(apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: userMessage, history: history.slice(0, -1) })
    });

    if (!resp.ok) throw new Error('API ' + resp.status);

    const data = await resp.json();
    const reply = data.reply || '（未收到回复）';

    apiAvailable = true;
    messages[placeholderIdx].text = reply;
  } catch(e) {
    console.error('API error:', e);
    apiAvailable = false;
    messages[placeholderIdx].text = '（无法连接到 AI 服务，请确认服务器已启动）';
  }

  updateUI();
  hideTyping();
  render();
  saveMessages();
  isStreaming = false;
  document.getElementById('sendBtn').disabled = false;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function setTheme(theme) {
  document.body.dataset.theme = theme;
  localStorage.setItem('nahida_theme', theme);
}

function clearChat() {
  if (confirm('确定清空所有聊天记录？这将同时重置验证状态。')) {
    messages = [];
    codeStep = 0;
    saveMessages();
    render();
    updateUI();
  }
}

function initTheme() {
  const saved = localStorage.getItem('nahida_theme');
  if (saved) document.body.dataset.theme = saved;
}

// Check API availability
async function checkAPI() {
  try {
    const resp = await fetch(API_BASE + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'ping', history: [] }),
      signal: AbortSignal.timeout(3000)
    });
    apiAvailable = resp.ok;
  } catch(e) {
    apiAvailable = false;
  }
  updateUI();
}

loadMessages();
initTheme();
updateUI();
render();
checkAPI();
</script>

</body>
</html>
